<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="880" height="400" rx="14" fill="#0d1117"/>

  <!-- title -->
  <text x="40" y="46" fill="#e6edf3" font-size="26" font-weight="700">agent-memory-vault</text>
  <text x="40" y="70" fill="#8b949e" font-size="14">shared long-term memory + knowledge ingest for AI coding agents</text>

  <!-- agents row -->
  <g>
    <rect x="120" y="96" width="150" height="38" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="195" y="120" fill="#e6edf3" font-size="14" text-anchor="middle">Claude Code</text>
    <rect x="300" y="96" width="120" height="38" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="360" y="120" fill="#e6edf3" font-size="14" text-anchor="middle">Codex</text>
    <rect x="450" y="96" width="160" height="38" rx="8" fill="#161b22" stroke="#30363d" stroke-dasharray="4 3"/>
    <text x="530" y="120" fill="#8b949e" font-size="14" text-anchor="middle">your agent…</text>
  </g>

  <!-- arrow -->
  <line x1="365" y1="138" x2="365" y2="168" stroke="#484f58" stroke-width="2"/>
  <polygon points="365,176 360,166 370,166" fill="#484f58"/>
  <text x="385" y="160" fill="#6e7681" font-size="12">boot · write · query · ingest</text>

  <!-- vault container -->
  <rect x="40" y="184" width="800" height="190" rx="12" fill="#0b0f14" stroke="#21262d"/>
  <text x="60" y="210" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1">SHARED MARKDOWN / OBSIDIAN VAULT</text>

  <!-- expression layer -->
  <rect x="60" y="224" width="370" height="130" rx="10" fill="#0d2b22" stroke="#238636"/>
  <text x="80" y="250" fill="#3fb950" font-size="15" font-weight="700">EXPRESSION layer · LLM Wiki</text>
  <text x="80" y="276" fill="#adbac7" font-size="13">• typed pages (00_Inbox … 10_Resume)</text>
  <text x="80" y="298" fill="#adbac7" font-size="13">• [[wikilinks]] graph</text>
  <text x="80" y="320" fill="#adbac7" font-size="13">• WRITE_GUIDE (schema / rules)</text>
  <text x="80" y="342" fill="#adbac7" font-size="13">• index pages</text>

  <!-- runtime layer -->
  <rect x="450" y="224" width="370" height="130" rx="10" fill="#2b220d" stroke="#9e6a03"/>
  <text x="470" y="250" fill="#d29922" font-size="15" font-weight="700">RUNTIME layer · GBrain</text>
  <text x="470" y="276" fill="#adbac7" font-size="13">• embeddings.json (vectors)</text>
  <text x="470" y="298" fill="#adbac7" font-size="13">• relations.json (entity graph)</text>
  <text x="470" y="320" fill="#adbac7" font-size="13">• log.md (timeline) · hot.md (working mem)</text>
  <text x="470" y="342" fill="#adbac7" font-size="13">• ingest · lint · dream loops</text>
</svg>
